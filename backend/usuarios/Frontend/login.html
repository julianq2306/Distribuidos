<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e5e0;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      background: #e6f1fb;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
    }

    .logo-icon svg {
      width: 26px;
      height: 26px;
      stroke: #185fa5;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 1.5rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 0 12px;
      height: 38px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #888;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap button {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: #aaa;
      display: flex;
      align-items: center;
    }

    .input-wrap button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .btn {
      width: 100%;
      height: 38px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <h1>Iniciar sesión</h1>
      <p class="subtitle">Sistema de gestión de inventario</p>
    </div>

    <div class="error" id="error-msg">
      <span>⚠</span>
      <span id="error-text">Credenciales incorrectas</span>
    </div>

    <div class="field">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="tu@correo.com" />
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" />
        <button type="button" id="toggle-pw" aria-label="Mostrar contraseña">
          <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn" id="btn-login">
      <span id="btn-text">Entrar</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/auth/login';

    document.getElementById('toggle-pw').addEventListener('click', function () {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('btn-login').addEventListener('click', handleLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btn-text');
      const btn = document.getElementById('btn-login');

      errEl.style.display = 'none';

      if (!email || !password) {
        showError('Por favor completa todos los campos.');
        return;
      }

      spinner.style.display = 'block';
      btnText.textContent = 'Entrando...';
      btn.disabled = true;

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('role', data.role);
          localStorage.setItem('name', data.name);
          btnText.textContent = '✓ Bienvenido, ' + data.name;
          // Redirigir según el rol
          if (data.role === 'admin') {
            window.location.href = '/frontend/demanda.html';
          } else {
            window.location.href = '/frontend/demanda.html';
          }
        } else {
          showError(data.message || 'Error al iniciar sesión.');
          btnText.textContent = 'Entrar';
        }
      } catch {
        showError('No se pudo conectar al servidor.');
        btnText.textContent = 'Entrar';
      }

      spinner.style.display = 'none';
      btn.disabled = false;
    }

    function showError(msg) {
      const errEl = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = msg;
      errEl.style.display = 'flex';
    }
  </script>
</body>
</html>
