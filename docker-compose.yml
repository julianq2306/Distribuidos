services:

  usuarios:
    build: ./backend/usuarios
    container_name: usuarios_service
    environment:
      DATABASE_URL: postgresql://postgres.vzlrzsupvzyiqwetmgyt:distribuidos123@aws-1-us-east-2.pooler.supabase.com:6543/postgres?sslmode=disable
      JWT_SECRET: clave_secreta_clinica_2024
    ports:
      - "3000:3000"
    restart: always

  demanda:
    build: ./backend/demanda
    container_name: demanda_service
    environment:
      DATABASE_URL: postgresql://postgres.vzlrzsupvzyiqwetmgyt:distribuidos123@aws-1-us-east-2.pooler.supabase.com:6543/postgres?sslmode=disable
    ports:
      - "8001:8001"
    restart: always
    depends_on:
      - usuarios

  inventario:
    build: ./backend/inventario
    container_name: inventario_service
    environment:
      DATABASE_URL: postgresql://postgres.vzlrzsupvzyiqwetmgyt:distribuidos123@aws-1-us-east-2.pooler.supabase.com:6543/postgres?sslmode=disable
    ports:
      - "3001:3001"
    restart: always
    depends_on:
      - usuarios

  frontend:
    build: ./frontend
    container_name: frontend_service
    ports:
      - "80:80"
    restart: always
    depends_on:
      - usuarios
      - inventario
      - demanda

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_sdi
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    restart: always