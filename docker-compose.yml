services:

  postgres:
    image: postgres:16-alpine

    environment:
      POSTGRES_DB: sdi_db
      POSTGRES_USER: sdi_user
      POSTGRES_PASSWORD: sdi_pass

    ports:
      - "5432:5432"

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  demanda:
    build: ./backend/demanda

    environment:
      DATABASE_URL: postgresql://sdi_user:sdi_pass@postgres:5432/sdi_db

    ports:
      - "8001:8001"

    depends_on:
      - postgres

  usuarios:
    build: ./backend/usuarios

    environment:
      DATABASE_URL: postgresql://sdi_user:sdi_pass@postgres:5432/sdi_db

    ports:
      - "8002:8002"

    depends_on:
      - postgres